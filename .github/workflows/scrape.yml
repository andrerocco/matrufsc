name: Scrape next semester

on:
  schedule:
    - cron: "0 6 * * *" # 3h BRT (UTC-3)
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "scrape"
  cancel-in-progress: true

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install Python dependencies
        working-directory: ./db
        run: uv sync

      - name: Scrape next semester
        id: scrape
        working-directory: ./db/src
        run: |
          uv run python main.py; EXIT_CODE=$?
          if [ $EXIT_CODE -eq 0 ]; then
            echo "has_data=true" >> "$GITHUB_OUTPUT"
          elif [ $EXIT_CODE -eq 2 ]; then
            echo "No new semester available"
          else
            exit $EXIT_CODE
          fi

      - name: Commit and push
        id: commit
        if: steps.scrape.outputs.has_data == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add matrufsc/public/data/
          git commit -m "feat: add new semester data"
          git push
          echo "committed=true" >> "$GITHUB_OUTPUT"

    outputs:
      committed: ${{ steps.commit.outputs.committed }}

  deploy:
    needs: scrape
    if: needs.scrape.outputs.committed == 'true'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: "npm"
          cache-dependency-path: matrufsc/package-lock.json

      - name: Install dependencies
        working-directory: ./matrufsc
        run: npm ci

      - name: Build
        working-directory: ./matrufsc
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./matrufsc/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
